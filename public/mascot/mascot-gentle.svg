<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </radialGradient>
    <radialGradient id="screenGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="70%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3BA8" flood-opacity="0.25"/>
    </filter>
    <filter id="screenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Antenna (slightly drooped) -->
  <line x1="100" y1="38" x2="80" y2="18" stroke="#5A4BD1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="17" r="6" fill="url(#glow)" filter="url(#screenGlow)"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Screen face -->
  <rect x="65" y="95" width="70" height="52" rx="14" fill="url(#screenGrad)" stroke="#5A4BD1" stroke-width="2.5"/>

  <!-- Eyes - big, slightly downturned, puppy-dog -->
  <ellipse cx="90" cy="116" rx="9" ry="10" fill="#2D1B69"/>
  <ellipse cx="110" cy="116" rx="9" ry="10" fill="#2D1B69"/>
  <!-- Eye highlights (bigger, sadder) -->
  <circle cx="87" cy="113" r="3.5" fill="white"/>
  <circle cx="107" cy="113" r="3.5" fill="white"/>
  <!-- Eyebrow crease (slight worry) -->
  <path d="M79 105 Q90 109 101 105" stroke="#2D1B69" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M99 105 Q110 109 121 105" stroke="#2D1B69" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Mouth - small wavy sad line -->
  <path d="M92 133 Q96 130 100 133 Q104 136 108 133" stroke="#5A4BD1" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Blush (subtle) -->
  <ellipse cx="76" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.2"/>
  <ellipse cx="124" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.2"/>

  <!-- Arms - hands together, consoling -->
  <path d="M48 142 Q38 152 42 164 Q44 170 50 172" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M152 142 Q162 152 158 164 Q156 170 150 172" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <ellipse cx="82" cy="190" rx="18" ry="12" fill="#5A4BD1"/>
  <ellipse cx="118" cy="190" rx="18" ry="12" fill="#5A4BD1"/>

  <!-- Tear drop -->
  <path d="M138 95 Q140 90 142 95 Q140 99 138 95 Z" fill="#6BCB77" opacity="0.7"/>

  <!-- Gentle heart (consoling, not sad-sad) -->
  <text x="30" y="68" font-size="14" fill="#FF6B6B" opacity="0.5">♥</text>
</svg>
