<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </radialGradient>
    <radialGradient id="screenGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="70%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3BA8" flood-opacity="0.25"/>
    </filter>
    <filter id="screenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Antenna -->
  <line x1="100" y1="38" x2="72" y2="14" stroke="#5A4BD1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="72" cy="12" r="6" fill="url(#glow)" filter="url(#screenGlow)"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Screen face -->
  <rect x="65" y="95" width="70" height="52" rx="14" fill="url(#screenGrad)" stroke="#5A4BD1" stroke-width="2.5"/>

  <!-- Eyes - looking up-right, thoughtful -->
  <ellipse cx="90" cy="115" rx="7" ry="8" fill="#2D1B69"/>
  <ellipse cx="110" cy="115" rx="7" ry="8" fill="#2D1B69"/>
  <!-- Pupils looking up and right -->
  <circle cx="92" cy="113" r="3.5" fill="white"/>
  <circle cx="112" cy="113" r="3.5" fill="white"/>
  <!-- Slightly furrowed brow -->
  <path d="M80 106 Q90 102 100 106" stroke="#2D1B69" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M100 106 Q110 102 120 106" stroke="#2D1B69" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth - pursed/thinking to one side -->
  <ellipse cx="96" cy="132" rx="4" ry="3" fill="#5A4BD1" opacity="0.5"/>

  <!-- Blush (lighter) -->
  <ellipse cx="76" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.25"/>
  <ellipse cx="124" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.25"/>

  <!-- Right arm - hand on chin (thinking pose) -->
  <path d="M150 140 Q158 152 155 162 Q152 168 145 170" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="143" cy="170" r="5" fill="#5A4BD1"/>

  <!-- Left arm - behind back or resting -->
  <path d="M50 145 Q38 152 42 165 Q44 170 48 172" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <ellipse cx="80" cy="190" rx="18" ry="12" fill="#5A4BD1"/>
  <ellipse cx="120" cy="190" rx="18" ry="12" fill="#5A4BD1"/>

  <!-- Thought bubble -->
  <circle cx="148" cy="70" r="5" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <circle cx="158" cy="59" r="7" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <ellipse cx="172" cy="43" rx="20" ry="14" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <!-- Dots in thought bubble -->
  <circle cx="166" cy="41" r="2.5" fill="#5A4BD1"/>
  <circle cx="174" cy="41" r="2.5" fill="#5A4BD1"/>
  <circle cx="179" cy="41" r="2.5" fill="#5A4BD1"/>

  <!-- Little gears turning (thinking) -->
  <text x="148" y="92" font-size="9" fill="#C4B5FD" transform="rotate(15, 148, 92)">⚙</text>
</svg>
