<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </radialGradient>
    <radialGradient id="screenGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="70%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3BA8" flood-opacity="0.25"/>
    </filter>
    <filter id="screenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Antenna -->
  <line x1="100" y1="38" x2="72" y2="14" stroke="#5A4BD1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="72" cy="12" r="6" fill="url(#glow)" filter="url(#screenGlow)"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Screen face -->
  <rect x="65" y="95" width="70" height="52" rx="14" fill="url(#screenGrad)" stroke="#5A4BD1" stroke-width="2.5"/>

  <!-- Eyes - confident/warm, slightly squinted -->
  <ellipse cx="90" cy="116" rx="8" ry="9" fill="#2D1B69"/>
  <ellipse cx="110" cy="116" rx="8" ry="9" fill="#2D1B69"/>
  <circle cx="88" cy="113" r="3" fill="white"/>
  <circle cx="108" cy="113" r="3" fill="white"/>

  <!-- Confident smile with teeth -->
  <path d="M86 128 Q94 142 100 142 Q106 142 114 128" fill="#FF6B6B"/>
  <!-- Teeth -->
  <rect x="94" y="128" width="12" height="5" rx="1" fill="white"/>

  <!-- Blush -->
  <ellipse cx="76" cy="123" rx="9" ry="5" fill="#FF8A8A" opacity="0.35"/>
  <ellipse cx="124" cy="123" rx="9" ry="5" fill="#FF8A8A" opacity="0.35"/>

  <!-- Right arm - THUMBS UP! -->
  <path d="M152 135 Q168 128 175 115 Q178 108 176 102" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Thumb (the "up" part) -->
  <rect x="172" y="88" width="6" ry="2" height="18" fill="#5A4BD1" rx="3"/>
  <circle cx="175" cy="86" r="5" fill="#5A4BD1"/>
  <!-- Fist -->
  <ellipse cx="175" cy="106" rx="7" ry="6" fill="#5A4BD1"/>

  <!-- Left arm - relaxed at side -->
  <path d="M48 140 Q38 150 40 162 Q41 168 45 170" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Legs - confident stance -->
  <ellipse cx="78" cy="190" rx="18" ry="12" fill="#5A4BD1"/>
  <ellipse cx="122" cy="190" rx="18" ry="12" fill="#5A4BD1"/>

  <!-- Sparkle/star next to thumb -->
  <text x="185" y="72" font-size="18" fill="#FFD93D">✦</text>

  <!-- "You got this!" lines -->
  <line x1="160" y1="68" x2="168" y2="68" stroke="#6BCB77" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="163" y1="62" x2="167" y2="62" stroke="#6BCB77" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="165" y1="56" x2="167" y2="56" stroke="#6BCB77" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Wink hint - one eye slightly different -->
  <!-- (keeping both open for confidence, but with slight variation) -->
</svg>
