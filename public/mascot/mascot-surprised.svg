<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </radialGradient>
    <radialGradient id="screenGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="70%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3BA8" flood-opacity="0.25"/>
    </filter>
    <filter id="screenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shock lines around body -->
  <line x1="152" y1="65" x2="165" y2="58" stroke="#FFD93D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="78" x2="172" y2="75" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="90" x2="168" y2="92" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="65" x2="35" y2="58" stroke="#FFD93D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="78" x2="28" y2="75" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>

  <!-- Antenna (zigzag from shock) -->
  <line x1="100" y1="38" x2="72" y2="14" stroke="#5A4BD1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="72" cy="12" r="6" fill="url(#glow)" filter="url(#screenGlow)"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Screen face -->
  <rect x="65" y="95" width="70" height="52" rx="14" fill="url(#screenGrad)" stroke="#5A4BD1" stroke-width="2.5"/>

  <!-- Eyes - WIDE open, tiny pupils (shocked!) -->
  <circle cx="90" cy="115" r="11" fill="white" stroke="#2D1B69" stroke-width="2.5"/>
  <circle cx="110" cy="115" r="11" fill="white" stroke="#2D1B69" stroke-width="2.5"/>
  <!-- Tiny pupils -->
  <circle cx="90" cy="115" r="3.5" fill="#2D1B69"/>
  <circle cx="110" cy="115" r="3.5" fill="#2D1B69"/>
  <!-- Pupil highlights -->
  <circle cx="88" cy="113" r="1.5" fill="white"/>
  <circle cx="108" cy="113" r="1.5" fill="white"/>

  <!-- Open mouth - big O -->
  <ellipse cx="100" cy="134" rx="10" ry="8" fill="#2D1B69"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="139" rx="5" ry="3.5" fill="#FF8A8A" opacity="0.7"/>

  <!-- Blush (pale from shock) -->
  <ellipse cx="76" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.2"/>
  <ellipse cx="124" cy="122" rx="8" ry="4" fill="#FF8A8A" opacity="0.2"/>

  <!-- Arms - thrown back in surprise -->
  <path d="M48 138 Q30 130 25 118 Q22 110 18 108" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M152 138 Q170 130 175 118 Q178 110 182 108" stroke="#5A4BD1" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Legs - slightly apart, staggered (stumbled back) -->
  <ellipse cx="72" cy="188" rx="17" ry="11" fill="#5A4BD1" transform="rotate(-10, 72, 188)"/>
  <ellipse cx="128" cy="192" rx="17" ry="11" fill="#5A4BD1" transform="rotate(8, 128, 192)"/>

  <!-- Exclamation mark -->
  <text x="22" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF6B6B">!</text>
  <text x="160" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF6B6B">!</text>

  <!-- Sweat drop -->
  <path d="M145 85 Q148 78 151 85 Q148 90 145 85 Z" fill="#6BCB77"/>
</svg>
